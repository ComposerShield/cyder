name: Build Cyder

on:
  push:
    branches:
      - '**'

jobs:
  mac-15-build-xcode:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install ccache
        run: brew install ccache

      - name: Ensure ccache dir exists
        run: mkdir -p ~/.ccache

      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp','**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-ccache-
        
      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Configure CMake (Xcode generator)
        env:
          CCACHE_DIR: ~/.ccache
        run: cmake -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache . -B build -G Xcode

      - name: Build
        run: cmake --build build --config Release --target Cyder_All
        
      - name: Run Unit Tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Save ccache
        if: ${{ always() }}
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp','**/*.h') }}

  windows-11-build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Install ccache
        run: choco install ccache -y

      - name: Ensure ccache dir exists
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$Env:USERPROFILE\\.ccache"

      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.USERPROFILE }}/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp','**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure CMake (Visual Studio generator)
        env:
          CCACHE_DIR: ${{ env.USERPROFILE }}/.ccache
        run: cmake -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache . -B build -G "Visual Studio 17 2022"

      - name: Build (parallel)
        run: cmake --build build --config Release --target Cyder_All -- /m

      - name: Run Unit Tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Save ccache
        if: ${{ always() }}
        uses: actions/cache@v3
        with:
          path: ${{ env.USERPROFILE }}/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp','**/*.h') }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install cpplint
        run: pip3 install cpplint

      - name: Run CPPLint
        run: ./runCpplint.sh
